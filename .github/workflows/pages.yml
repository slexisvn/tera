name: Deploy notebook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: 24

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tera
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            notebook/package-lock.json

      - name: Install tera dependencies
        run: npm ci

      - name: Install notebook dependencies
        run: npm ci
        working-directory: notebook

      - name: Build tera browser bundles
        run: npm run build

      - name: Typecheck notebook
        run: npm run typecheck
        working-directory: notebook

      - name: Build notebook
        run: npm run build
        working-directory: notebook

      - name: Disable Jekyll
        run: touch notebook/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: notebook/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
